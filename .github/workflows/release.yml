name: Build and Release CLI

# This workflow only triggers when you push a Git tag that starts with 'v' (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*'

# We give the permissions
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # run the job on 3 different operating systems
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests nuitka

      - name: Build with Nuitka
        # --onefile packages everything into a single binary
        # --assume-yes-for-downloads lets Nuitka download required C compilers without prompting
        run: |
          python -m nuitka --standalone --onefile --assume-yes-for-downloads main.py

      # Windows release.
      - name: Rename Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: rename main.exe canvas-downloader-windows.exe

      # Linux release.
      - name: Rename Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv main.bin canvas-downloader-linux

      # MacOS release.
      - name: Rename Binary (macOS)
        if: matrix.os == 'macos-latest'
        run: mv main.bin canvas-downloader-macos

      # This action automatically uploads the renamed files to GitHub Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            canvas-downloader-windows.exe
            canvas-downloader-linux
            canvas-downloader-macos
